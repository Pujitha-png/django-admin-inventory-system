{% extends "admin/base_site.html" %}
{% load static %}

{% block title %}Inventory Admin{% endblock %}

{% block extrahead %}
  {{ block.super }}
  <link rel="stylesheet" href="{% static 'admin-custom/admin.css' %}">
  <script src="{% static 'admin-custom/theme-toggle.js' %}"></script>
{% endblock %}

{% block branding %}
  <div class="branding">
    <div class="brand-left">
      <img src="{% static 'admin-custom/logo.svg' %}" class="logo" alt="Inventory">
      <div>
        <h1>Inventory Admin</h1>
        <div style="font-size:0.85rem; color: #cbd5e1;">Back-office product inventory</div>
      </div>
    </div>
    <div class="brand-right">
      <nav aria-label="quick-links" style="font-size:0.9rem; color:#cbd5e1;">
        <a href="/" style="color:inherit; text-decoration:none; margin-right:12px;">View site</a>
        <a href="/admin/password_change/" style="color:inherit; text-decoration:none; margin-right:12px;">Change password</a>
      </nav>
      <div class="theme-toggle" role="group" aria-label="Theme toggle">
        <button type="button" data-theme="auto" aria-pressed="false">Auto</button>
        <button type="button" data-theme="light" aria-pressed="false">Light</button>
        <button type="button" data-theme="dark" aria-pressed="false">Dark</button>
      </div>
    </div>
  </div>
{% endblock %}
